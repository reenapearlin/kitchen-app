services:
  db:
    image: mongo:7.0
    container_name: kitchen-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: Secret123!
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--host", "127.0.0.1", "-u", "admin", "-p", "Secret123!", "--authenticationDatabase", "admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s

  api:
    build:
      context: ./api
      target: production
    image: kitchen-api:local
    environment:
      MONGO_URI: mongodb://admin:Secret123!@db:27017/kitchendb?authSource=admin
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  web-ui:
    build:
      context: ./web-ui
    image: kitchen-web:local
    ports:
      - "8081:80"
    depends_on:
      api:
        condition: service_healthy
