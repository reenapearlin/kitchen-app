apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: kitchen-app
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: "kitchen"
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        options:
          path: /var/lib/grafana/dashboards

  kitchen-dashboard.json: |
    {
      "title": "Kitchen API Monitoring",
      "schemaVersion": 30,
      "version": 1,
      "panels": [
        {
          "type": "timeseries",
          "title": "Total Requests",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[1m]))",
              "legendFormat": "requests/sec"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Requests by Route",
          "targets": [
            {
              "expr": "sum by (route) (rate(http_requests_total[1m]))",
              "legendFormat": "{{route}}"
            }
          ]
        }
      ]
    }