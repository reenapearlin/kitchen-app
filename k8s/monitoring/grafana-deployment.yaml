apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: kitchen-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000

        volumeMounts:
        - name: grafana-dashboards
          mountPath: /var/lib/grafana/dashboards

        - name: grafana-dashboard-provider
          mountPath: /etc/grafana/provisioning/dashboards

      volumes:
      - name: grafana-dashboards
        configMap:
          name: grafana-dashboards

      - name: grafana-dashboard-provider
        configMap:
          name: grafana-dashboards