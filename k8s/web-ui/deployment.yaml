apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitchen-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kitchen-web
  template:
    metadata:
      labels:
        app: kitchen-web
    spec:
      containers:
      - name: web-ui
        image: kitchen-web:local
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: kitchen-web
spec:
  type: NodePort
  selector:
    app: kitchen-web
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080