<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Orders</title>

<style>
:root {
  --bg:#0b1120;
  --card:#111827;
  --border:#263347;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --blue:#58a6ff;
  --green:#3fb950;
  --red:#f78166;
}

body{
  font-family:system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  max-width:880px;
  margin:0 auto;
  padding:28px 16px;
}

h1{margin:0 0 10px;font-size:28px;}
.sub{color:var(--muted);margin:0 0 18px;}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
}

.row{
  display:flex;
  gap:10px;
  align-items:center;
}

input{
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#0d1117;
  color:var(--text);
}

button{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(88,166,255,.15);
  color:var(--text);
  cursor:pointer;
}

button:hover{background:rgba(88,166,255,.25);}

.pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 10px;
  border:1px solid var(--border);
  border-radius:999px;
  color:var(--muted);
  font-size:12px;
}

.ok{color:var(--green);}
.bad{color:var(--red);}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

th,td{
  padding:10px 8px;
  border-bottom:1px solid rgba(38,51,71,.65);
  text-align:left;
}

th{
  color:var(--muted);
  font-weight:600;
}

.footer{
  margin-top:14px;
  color:var(--muted);
  font-size:12px;
}

@media(max-width:820px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<h1>Kitchen Orders</h1>
<p class="sub">Create orders and watch them appear in MongoDB.</p>

<div class="grid">

<div class="card">
<div class="row" style="justify-content:space-between;margin-bottom:10px;">
<div class="pill">API status: <span id="apiStatus" class="bad">checking…</span></div>
<div class="row" style="gap:12px;">
<a href="/api/metrics" target="_blank">/metrics</a>
<a href="/api/health" target="_blank">/health</a>
</div>
</div>

<div class="row">
<input id="dish" placeholder="Dish name (e.g. Masala Dosa)">
<button id="createBtn">Create order</button>
</div>

<div class="footer" id="createMsg"></div>
</div>

<div class="card">
<div class="row" style="justify-content:space-between;margin-bottom:10px;">
<div class="pill">Orders: <span id="orderCount">0</span></div>
<button id="refreshBtn">Refresh</button>
</div>

<div style="overflow:auto;">
<table>
<thead>
<tr>
<th>Dish</th>
<th>Status</th>
<th>Created</th>
<th>ID</th>
</tr>
</thead>
<tbody id="ordersBody">
<tr><td colspan="4">Loading…</td></tr>
</tbody>
</table>
</div>

<div class="footer">
Open Prometheus later to see request metrics increase.
</div>
</div>

</div>

<script>

const apiBase="/api";

const el=id=>document.getElementById(id);

function fmtDate(v){
  const d=new Date(v);
  if(Number.isNaN(d.getTime())) return "";
  return d.toLocaleString();
}

async function apiGet(path){
  const r=await fetch(apiBase+path);
  return {r,data:await r.json().catch(()=>null)};
}

async function refreshHealth(){
  const s=el("apiStatus");
  try{
    const {r,data}=await apiGet("/health");
    if(r.ok){
      s.textContent=`ok (db: ${data.db})`;
      s.className="ok";
    }else{
      s.textContent="error";
      s.className="bad";
    }
  }catch{
    s.textContent="offline";
    s.className="bad";
  }
}

async function refreshOrders(){
  const body=el("ordersBody");
  body.innerHTML="<tr><td colspan='4'>Loading…</td></tr>";

  try{
    const {r,data}=await apiGet("/orders");
    if(!r.ok) throw new Error();

    const orders=Array.isArray(data)?data:[];

    el("orderCount").textContent=orders.length;

    if(!orders.length){
      body.innerHTML="<tr><td colspan='4'>No orders yet.</td></tr>";
      return;
    }

    body.innerHTML=orders.slice().reverse().map(o=>`
      <tr>
      <td>${o.dish}</td>
      <td>${o.status}</td>
      <td>${fmtDate(o.createdAt)}</td>
      <td>${o._id}</td>
      </tr>
    `).join("");

  }catch{
    body.innerHTML="<tr><td colspan='4'>Failed to load orders</td></tr>";
  }
}

async function createOrder(){
  const dish=el("dish").value.trim();
  const msg=el("createMsg");

  if(!dish){
    msg.textContent="Enter a dish name first.";
    return;
  }

  const r=await fetch(apiBase+"/orders",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({dish})
  });

  const data=await r.json();

  if(r.ok){
    msg.textContent=`Created: ${data.dish}`;
    el("dish").value="";
    refreshOrders();
  }else{
    msg.textContent="Create failed";
  }
}

el("createBtn").addEventListener("click",createOrder);
el("refreshBtn").addEventListener("click",refreshOrders);

refreshHealth();
refreshOrders();

setInterval(refreshHealth,8000);
setInterval(refreshOrders,5000);

</script>

</body>
</html>
