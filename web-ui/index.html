<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Orders</title>

<style>
:root {
  --bg-start:#2a0711;
  --bg-end:#5b0d24;
  --card-bg:#ffffff;
  --card-border:rgba(255, 255, 255, .35);
  --text:#fdf2f8;
  --surface-text:#4a1020;
  --muted:#fbcfe8;
  --surface-muted:#7b4d5b;
  --primary:#9f1239;
  --accent:#be123c;
  --peach:#fff3ee;
  --ok:#16a34a;
  --bad:#dc2626;
  --input-bg:#fffdfd;
  --soft-shadow:0 12px 30px rgba(16, 24, 40, .08);
  --hard-shadow:0 18px 42px rgba(16, 24, 40, .12);
  --radius:18px;
}

*{
  box-sizing:border-box;
  margin:0;
}

body{
  font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:
    radial-gradient(circle at 10% 12%, rgba(239, 68, 68, .18), transparent 34%),
    radial-gradient(circle at 88% 12%, rgba(244, 114, 182, .14), transparent 36%),
    linear-gradient(145deg, var(--bg-start), var(--bg-end));
  color:var(--text);
  min-height:100vh;
  padding:44px 20px;
  position:relative;
  overflow-x:hidden;
}

body::before,
body::after{
  content:"";
  position:fixed;
  border-radius:999px;
  pointer-events:none;
  z-index:0;
}

body::before{
  width:320px;
  height:320px;
  top:-70px;
  right:-60px;
  background:radial-gradient(circle at 35% 35%, rgba(255,255,255,.32), rgba(255,255,255,.05) 70%);
}

body::after{
  width:260px;
  height:260px;
  bottom:40px;
  left:-70px;
  background:radial-gradient(circle at 35% 35%, rgba(255,255,255,.28), rgba(255,255,255,.04) 72%);
}

.container{
  max-width:1060px;
  margin:0 auto;
  position:relative;
  z-index:1;
}

.hero{
  margin-bottom:28px;
  animation:fadeIn .65s ease both;
}

h1{
  font-size:48px;
  line-height:1.08;
  font-weight:800;
  letter-spacing:-.03em;
  background:linear-gradient(90deg, #ffffff 0%, #ffe4e6 50%, #fecdd3 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.sub{
  margin-top:10px;
  color:#fbcfe8;
  font-size:17px;
}

a{
  color:var(--primary);
  text-decoration:none;
  font-weight:600;
  transition:all .3s ease;
}

a:hover{
  color:var(--accent);
  text-decoration:underline;
}

.grid{
  display:grid;
  grid-template-columns:minmax(0, 1fr) minmax(0, 1fr);
  gap:20px;
}

.card{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--soft-shadow);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  transition:all .3s ease;
  animation:slideFade .55s ease both;
  color:var(--surface-text);
}

.card:nth-child(2){
  animation-delay:.1s;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:var(--hard-shadow);
  border-color:rgba(159, 18, 57, .65);
}

.row{
  display:flex;
  gap:12px;
  align-items:center;
  justify-content:space-between;
}

.links{
  display:flex;
  gap:14px;
}

.form-row{
  margin-top:14px;
  display:flex;
  gap:12px;
}

input{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid rgba(159, 18, 57, .25);
  background:var(--input-bg);
  color:var(--text);
  font-size:15px;
  transition:all .3s ease;
}

input:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(190, 24, 93, .16);
}

button{
  padding:11px 16px;
  border-radius:12px;
  border:1px solid rgba(127, 29, 29, .35);
  background:linear-gradient(135deg, #9f1239, #be123c);
  color:#ffffff;
  cursor:pointer;
  font-weight:700;
  font-size:14px;
  transition:all .3s ease;
}

button:hover{
  transform:translateY(-2px) scale(1.02);
  box-shadow:0 10px 24px rgba(127, 29, 29, .26);
  filter:saturate(1.1);
}

.pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  border:1px solid rgba(159, 18, 57, .24);
  border-radius:999px;
  color:var(--surface-muted);
  font-size:13px;
  background:#ffffff;
}

.ok{color:var(--ok);}
.bad{color:var(--bad);}

.section-label{
  margin-top:18px;
  color:var(--surface-muted);
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.08em;
  font-weight:600;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
  margin-top:6px;
}

th,td{
  padding:12px 8px;
  border-bottom:1px solid rgba(148, 163, 184, .15);
  text-align:left;
  transition:background .3s ease;
}

th{
  color:var(--surface-muted);
  font-weight:600;
  letter-spacing:.04em;
  font-size:12px;
  text-transform:uppercase;
}

tbody tr:hover td{
  background:rgba(190, 24, 93, .08);
}

.footer{
  margin-top:14px;
  color:var(--surface-muted);
  font-size:13px;
}

.menu-list{
  margin:10px 0 0;
  padding-left:0;
  list-style:none;
  display:grid;
  gap:8px;
}

.menu-list li{
  font-size:16px;
  position:relative;
  padding:8px 10px 8px 20px;
  border-radius:10px;
  border:1px solid rgba(159, 18, 57, .2);
  background:#ffffff;
  transition:all .3s ease;
}

.menu-list li:hover{
  border-color:rgba(190, 24, 93, .38);
  transform:translateX(2px);
}

.menu-list li::before{
  content:"";
  width:7px;
  height:7px;
  border-radius:50%;
  position:absolute;
  left:8px;
  top:15px;
  background:linear-gradient(180deg, #be123c, #9f1239);
  box-shadow:0 0 10px rgba(159, 18, 57, .35);
}

.special{
  margin-top:18px;
  padding:12px 14px;
  border:1px solid rgba(159, 18, 57, .35);
  border-radius:14px;
  background:
    radial-gradient(circle at 10% 20%, rgba(190, 24, 93, .14), transparent 35%),
    linear-gradient(135deg, #ffffff, #fff7f8);
  color:var(--surface-text);
  font-size:15px;
  font-weight:600;
  box-shadow:0 0 0 1px rgba(190, 24, 93, .14), 0 10px 18px rgba(127, 29, 29, .1);
}

#createMsg{
  min-height:18px;
  color:#9f1239;
}

.table-wrap{
  overflow:auto;
  border-radius:12px;
}

.sections{
  margin-top:12px;
  display:grid;
  gap:12px;
}

.status-block{
  border:1px solid rgba(159, 18, 57, .18);
  border-radius:12px;
  padding:10px 12px;
  background:#fffafa;
}

.status-title{
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.06em;
  color:#9f1239;
  margin-bottom:8px;
}

.status-list{
  display:grid;
  gap:8px;
}

.status-item{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:8px 10px;
  border-radius:10px;
  background:#ffffff;
  border:1px solid rgba(159, 18, 57, .14);
  font-size:14px;
}

.status-meta{
  color:var(--surface-muted);
  font-size:12px;
}

.empty-text{
  color:var(--surface-muted);
  font-size:13px;
}

@media(max-width:820px){
  body{
    padding:26px 14px;
  }
  h1{
    font-size:34px;
  }
  .sub{
    font-size:15px;
  }
  .grid{
    grid-template-columns:1fr;
  }
  .form-row{
    flex-direction:column;
  }
  button{
    width:100%;
  }
  .links{
    gap:10px;
    flex-wrap:wrap;
  }
}

@keyframes slideFade{
  from{
    opacity:0;
    transform:translateY(12px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="container">
<div class="hero">
<h1>Kitchen Orders Dashboard</h1>
<p class="sub">Create orders, track status, and monitor kitchen activity in real time.</p>
</div>

<div class="grid">

<div class="card">
<div class="row">
<div class="pill">API status: <span id="apiStatus" class="bad">checking…</span></div>
<div class="links">
<a href="/api/metrics" target="_blank">/metrics</a>
<a href="/api/health" target="_blank">/health</a>
<a href="/api/special" target="_blank">/special</a>
</div>
</div>

<div class="form-row">
<input id="dish" placeholder="Dish name (e.g. Masala Dosa)">
<button id="createBtn">Create order</button>
</div>

<div class="footer" id="createMsg"></div>
<div class="section-label">Menu</div>
<ul class="menu-list">
<li>Masala Dosa</li>
<li>Veg Biryani</li>
<li>Pasta</li>
</ul>
<div class="special">Today's Special: <strong id="specialDish">Loading…</strong></div>
</div>

<div class="card">
<div class="row">
<div class="pill">Orders: <span id="orderCount">0</span></div>
<button id="refreshBtn">Refresh</button>
</div>

<div id="ordersSections" class="sections">
<div class="status-block">
<div class="status-title">Loading…</div>
</div>
</div>

<div class="footer">
Open Prometheus later to see request metrics increase.
</div>
</div>

</div>
</div>

<script>

const apiBase="/api";

const el=id=>document.getElementById(id);

function esc(v){
  return String(v ?? "").replace(/[&<>"']/g,c=>({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[c]));
}

function fmtDate(v){
  const d=new Date(v);
  if(Number.isNaN(d.getTime())) return "";
  return d.toLocaleString();
}

async function apiGet(path){
  const r=await fetch(apiBase+path);
  return {r,data:await r.json().catch(()=>null)};
}

async function refreshHealth(){
  const s=el("apiStatus");
  try{
    const {r,data}=await apiGet("/health");
    if(r.ok){
      s.textContent=`ok (db: ${data.db})`;
      s.className="ok";
    }else{
      s.textContent="error";
      s.className="bad";
    }
  }catch{
    s.textContent="offline";
    s.className="bad";
  }
}

async function refreshOrders(){
  const sections=el("ordersSections");
  sections.innerHTML="<div class='status-block'><div class='status-title'>Loading…</div></div>";

  try{
    const {r,data}=await apiGet("/orders");
    if(!r.ok) throw new Error();

    const orders=Array.isArray(data)?data:[];

    el("orderCount").textContent=orders.length;

    const grouped={
      taken:orders.filter(o=>o.status==="pending"),
      preparing:orders.filter(o=>o.status==="preparing" || o.status==="ready"),
      served:orders.filter(o=>o.status==="served")
    };

    function sectionHtml(title,list){
      const items=list.slice().reverse().map(o=>`
        <div class="status-item">
          <div>
            <div><strong>${esc(o.dish)}</strong></div>
            <div class="status-meta">${esc(fmtDate(o.createdAt))}</div>
          </div>
          <div class="status-meta">${esc(o._id)}</div>
        </div>
      `).join("");

      return `
        <div class="status-block">
          <div class="status-title">${title} (${list.length})</div>
          <div class="status-list">
            ${items || "<div class='empty-text'>No orders in this section.</div>"}
          </div>
        </div>
      `;
    }

    sections.innerHTML=
      sectionHtml("Orders Taken",grouped.taken)+
      sectionHtml("Preparing",grouped.preparing)+
      sectionHtml("Served",grouped.served);

  }catch{
    sections.innerHTML="<div class='status-block'><div class='status-title'>Orders</div><div class='empty-text'>Failed to load orders</div></div>";
  }
}

async function refreshSpecial(){
  const s=el("specialDish");
  try{
    const {r,data}=await apiGet("/special");
    if(r.ok && data?.special){
      s.textContent=`${data.special} (${data.day})`;
      return;
    }
    s.textContent="Unavailable";
  }catch{
    s.textContent="Unavailable";
  }
}

async function createOrder(){
  const dish=el("dish").value.trim();
  const msg=el("createMsg");

  if(!dish){
    msg.textContent="Enter a dish name first.";
    return;
  }

  const r=await fetch(apiBase+"/orders",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({dish})
  });

  const data=await r.json();

  if(r.ok){
    msg.textContent=`Created: ${data.dish}`;
    el("dish").value="";
    refreshOrders();
  }else{
    msg.textContent="Create failed";
  }
}

el("createBtn").addEventListener("click",createOrder);
el("refreshBtn").addEventListener("click",refreshOrders);

refreshHealth();
refreshOrders();
refreshSpecial();

setInterval(refreshHealth,8000);
setInterval(refreshOrders,5000);

</script>

</body>
</html>
